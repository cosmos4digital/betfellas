workflows:
  ios-app:
    name: BetFellas iOS Build

    integrations:
      app_store_connect: NeoCosmos

    environment:
      groups:
        # CERTIFICATE_PRIVATE_KEY bu grupta tanımlı olmalı (Codemagic > Environment variables)
        - ios_signing
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.neocosmos.betfellas"
        VITE_SUPABASE_URL: "https://evolkslxmqfdnpatqldk.supabase.co"
        VITE_SUPABASE_ANON_KEY: "sb_publishable_yXR0Mlvj2qeXaXyPgSNfXQ_iQXNNtYU"

    scripts:
      - name: Paketleri Yükle (npm install)
        script: npm install

      - name: Web Çıktısını Al ve iOS'a Aktar
        script: npm run mobile:sync

      - name: Pod yükle
        script: |
          cd ios/App && pod install

      - name: Set up signing
        script: |
          set -e
          keychain initialize

          # İmzalama dosyalarını App Store Connect entegrasyonundan çek.
          # --certificate-key: sertifikanın kaydedilebilmesi için gereken özel anahtar.
          # CERTIFICATE_PRIVATE_KEY ortam değişkeni (ios_signing grubu) tanımlı olmalı.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create

          keychain add-certificates

          # Çekilen profilleri doğrula (Codemagic profilleri her iki konuma da kaydedebilir)
          PROFILE_COUNT=$(find \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
            -name '*.mobileprovision' 2>/dev/null | wc -l | tr -d ' ')
          echo "Bulunan provisioning profile sayısı: $PROFILE_COUNT"
          if [ "$PROFILE_COUNT" -eq 0 ]; then
            echo "HATA: '$BUNDLE_ID' için App Store dağıtım profili çekilemedi."
            echo "Codemagic > Team/App settings > Integrations bölümünde 'NeoCosmos' App Store Connect"
            echo "API anahtarının 'App Manager' yetkisine sahip olduğunu ve doğru ekibe bağlı olduğunu kontrol edin."
            exit 1
          fi

          # Çekilen profilleri Xcode projesine uygula (manuel imzalamaya geçer)
          xcode-project use-profiles

      - name: iOS Projesini Derle ve İmzala
        script: |
          set -e
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/xcarchive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
