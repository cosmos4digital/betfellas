workflows:
  ios-app:
    name: BetFellas iOS Build
    
    integrations:
      app_store_connect: NeoCosmos

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      # DİKKAT: Buradaki 'ios_signing' bloğunu tamamen sildik ki en başta hata vermesin!

    scripts:
      - name: Paketleri Yükle (npm install)
        script: npm install
        
      - name: Web Çıktısını Al ve iOS'a Aktar
        script: npm run mobile:sync
        
      # MAKİNE ÇALIŞTIKTAN SONRA SERTİFİKAYI VE PROFİLİ ŞİMDİ ZORLA ÜRETECEĞİZ:
      - name: Apple'dan Sertifika ve Profil Talep Et (Zorla)
        script: |
          app-store-connect fetch-signing-files "com.neocosmos.betfellas" --type IOS_APP_STORE --create
          
      - name: iOS Projesini Derle ve İmzala
        script: |
          xcode-project use-profiles
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
          
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
