workflows:
  ios-app:
    name: BetFellas iOS Build

    integrations:
      app_store_connect: NeoCosmos

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.neocosmos.betfellas" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Paketleri Yükle (npm install)
        script: npm install

      - name: Web Çıktısını Al ve iOS'a Aktar
        script: npm run mobile:sync

      - name: iOS Projesini Derle ve İmzala
        script: |
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true